<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempChat - Temporary Chatroom</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="bg-gray-900 text-white font-inter h-screen flex flex-col overflow-hidden">

    <!-- Notification Toast -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2"></div>

    <!-- MAIN APP CONTAINER -->
    <div id="app" class="relative w-full h-full flex items-center justify-center">

        <!-- ======================= 
             HOME SCREEN 
        ======================== -->
        <div id="home-screen"
            class="screen active text-center max-w-lg w-full px-6 transition-all duration-500 transform opacity-100 scale-100">
            <div class="mb-10 animate-float">
                <div
                    class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-gradient-to-tr from-purple-500 to-indigo-500 mb-6 shadow-lg shadow-purple-500/30">
                    <i class="fa-solid fa-comments text-4xl text-white"></i>
                </div>
                <h1
                    class="text-5xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-indigo-400">
                    TempChat</h1>
                <p class="text-gray-400 text-lg">Instant, temporary chatrooms. No trace left behind.</p>
            </div>

            <div class="space-y-4">
                <!-- Username Input (Global) -->
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                        <i
                            class="fa-solid fa-user text-gray-500 group-focus-within:text-purple-400 transition-colors"></i>
                    </div>
                    <input type="text" id="username"
                        class="bg-gray-800 border-2 border-gray-700 text-white text-sm rounded-xl focus:ring-purple-500 focus:border-purple-500 block w-full pl-10 p-4 transition-all"
                        placeholder="Enter your display name">
                </div>

                <div class="grid grid-cols-2 gap-4 mt-6">
                    <button id="btn-create-room"
                        class="relative overflow-hidden group bg-gray-800 border border-gray-700 hover:border-purple-500 rounded-xl p-4 transition-all duration-300 hover:shadow-[0_0_20px_rgba(168,85,247,0.15)] flex flex-col items-center gap-2">
                        <i
                            class="fa-solid fa-plus text-2xl text-purple-400 group-hover:scale-110 transition-transform"></i>
                        <span class="font-medium text-sm">Create Room</span>
                    </button>
                    <button id="btn-show-join"
                        class="relative overflow-hidden group bg-gray-800 border border-gray-700 hover:border-indigo-500 rounded-xl p-4 transition-all duration-300 hover:shadow-[0_0_20px_rgba(99,102,241,0.15)] flex flex-col items-center gap-2">
                        <i
                            class="fa-solid fa-right-to-bracket text-2xl text-indigo-400 group-hover:scale-110 transition-transform"></i>
                        <span class="font-medium text-sm">Join Room</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- ======================= 
             JOIN ROOM SCREEN 
        ======================== -->
        <div id="join-screen"
            class="screen hidden text-center max-w-sm w-full px-6 transition-all duration-500 transform translate-y-8 opacity-0">
            <button id="btn-back-join" class="absolute -top-16 left-6 text-gray-400 hover:text-white transition-colors">
                <i class="fa-solid fa-arrow-left mr-2"></i>Back
            </button>
            <div class="mb-8">
                <div
                    class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gray-800 mb-4 border border-indigo-500/30">
                    <i class="fa-solid fa-right-to-bracket text-2xl text-indigo-400"></i>
                </div>
                <h2 class="text-3xl font-bold mb-2">Join Room</h2>
                <p class="text-gray-400 text-sm">Enter the code to join an existing room</p>
            </div>

            <div class="space-y-4">
                <input type="text" id="room-code-input"
                    class="bg-gray-800 border-2 border-gray-700 text-white text-center text-2xl tracking-[0.2em] font-mono rounded-xl focus:ring-indigo-500 focus:border-indigo-500 block w-full p-4 transition-all uppercase"
                    placeholder="XXXXXX" maxlength="6">

                <button id="btn-join-room"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl text-lg px-5 py-4 focus:outline-none focus:ring-4 focus:ring-indigo-500/50 transition-all shadow-lg shadow-indigo-600/30">
                    Join Chat <i class="fa-solid fa-arrow-right ml-2"></i>
                </button>
            </div>
            <p id="join-error" class="text-red-400 text-sm mt-4 hidden"><i
                    class="fa-solid fa-circle-exclamation mr-1"></i> Room not found</p>
        </div>

        <!-- ======================= 
             CHAT ROOM SCREEN 
        ======================== -->
        <div id="chat-screen"
            class="screen hidden w-full h-full flex flex-col bg-gray-900 transition-all duration-500 opacity-0">
            <!-- Header -->
            <header
                class="bg-gray-800/80 backdrop-blur-md border-b border-gray-700 p-4 flex items-center justify-between z-10 sticky top-0">
                <div class="flex items-center gap-3">
                    <button id="btn-leave-room"
                        class="text-gray-400 hover:text-red-400 transition-colors bg-gray-700/50 hover:bg-gray-700 rounded-lg w-10 h-10 flex items-center justify-center cursor-pointer relative group">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                        <!-- Tooltip -->
                        <span
                            class="absolute left-12 bg-gray-800 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">Leave
                            Room</span>
                    </button>
                    <div>
                        <h2 class="text-xl font-bold flex items-center gap-2">
                            Room: <span id="display-room-code"
                                class="text-purple-400 font-mono tracking-wider bg-purple-500/10 px-2 py-0.5 rounded-md cursor-pointer hover:bg-purple-500/20 transition-colors"
                                title="Click to copy">XXXXXX</span>
                        </h2>
                        <div id="btn-show-users"
                            class="flex items-center gap-2 text-xs text-gray-400 mt-1 cursor-pointer hover:text-white transition-colors group">
                            <span class="relative flex h-2 w-2">
                                <span
                                    class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                            </span>
                            <span id="active-users-count">1 user online</span>
                            <i
                                class="fa-solid fa-chevron-down text-[10px] opacity-0 group-hover:opacity-100 transition-all"></i>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Chat Area -->
            <main id="chat-messages" class="flex-1 overflow-y-auto p-4 pb-24 space-y-4 scroll-smooth min-h-0">
                <!-- Messages will be injected here -->
            </main>

            <!-- Typing Indicator Area -->
            <div id="typing-indicator" class="px-6 py-2 text-xs text-gray-400 italic h-8 opacity-0 transition-opacity">
                <!-- Someone is typing... -->
            </div>

            <!-- Input Area -->
            <footer class="bg-gray-800/80 backdrop-blur-md border-t border-gray-700 p-4 sticky bottom-0">
                <form id="chat-form" class="max-w-5xl mx-auto relative flex items-center">
                    <input type="text" id="message-input" autocomplete="off"
                        class="bg-gray-900 border border-gray-700 text-white rounded-full focus:ring-2 focus:ring-purple-500 focus:border-purple-500 block w-full pl-6 pr-16 py-3.5 transition-all shadow-inner"
                        placeholder="Type a message...">
                    <button type="submit" id="btn-send"
                        class="absolute right-2 top-1/2 transform -translate-y-1/2 w-10 h-10 rounded-full bg-purple-600 hover:bg-purple-500 text-white flex items-center justify-center transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fa-solid fa-paper-plane text-sm translate-x-[-1px] translate-y-[1px]"></i>
                    </button>
                </form>
            </footer>

            <!-- Users List Modal -->
            <div id="users-modal"
                class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
                <div
                    class="bg-gray-800 border border-gray-700 rounded-2xl w-full max-w-xs overflow-hidden shadow-2xl transform scale-95 transition-transform duration-300">
                    <div class="p-4 border-b border-gray-700 flex items-center justify-between">
                        <h3 class="font-bold flex items-center gap-2">
                            <i class="fa-solid fa-users text-purple-400"></i> Active Users
                        </h3>
                        <button id="btn-close-users" class="text-gray-500 hover:text-white transition-colors">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                    <div id="users-list" class="p-2 max-h-64 overflow-y-auto">
                        <!-- User items will be injected here -->
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- SockJS and STOMP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <!-- Application Logic -->
    <script src="/js/app.js"></script>
</body>

</html>
